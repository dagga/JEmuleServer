# JEmuleServer Configuration
# Port to listen on (default: 4661)
port=4661

# Max packet size in bytes (default: 2097152)
maxPacketSize=2097152

# Max search results returned (default: 300)
maxSearchResults=300

# Flood protection: max requests per second per IP (default: 50)
floodMaxRequestsPerSecond=50

# Max concurrent users (default: 100000)
maxUsers=100000

# Max global files (default: 10000000)
maxFiles=10000000

# Max files per user (default: 5000)
maxFilesPerUser=5000

# Max sources per file request (default: 200)
maxSourcesPerFile=200

# Database path (default: ./jemule_db)
databasePath=./jemule_db

# IP Filter path (e.g., ipfilter.dat)
# ipFilterPath=ipfilter.dat

# Fake file detection (default: true)
fakeFileDetectionEnabled=true

# Circuit Breaker: Failure rate threshold percentage (default: 50.0)
cbFailureRateThreshold=50.0

# Circuit Breaker: Min calls before calculating rate (default: 10)
cbMinimumNumberOfCalls=10

# Circuit Breaker: Wait duration in seconds (default: 60)
cbWaitDurationInSeconds=60
